services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    user: '${LOCAL_UID:-1000}:${LOCAL_GID:-1000}'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      NODE_ENV: development
      PORT: ${PORT:-8080}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:?DB_NAME is required in .env}
      DB_USER: ${DB_USER:?DB_USER is required in .env}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required in .env}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required in .env}
      LOG_DIR: ${LOG_DIR:-/app/.logs}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      LOG_MAX_FILES: ${LOG_MAX_FILES:-7d}
      LOG_MAX_SIZE: ${LOG_MAX_SIZE:-10m}
      LOG_DATE_PATTERN: ${LOG_DATE_PATTERN:-YYYY-MM-DD}
      LOG_ZIPPED_ARCHIVE: ${LOG_ZIPPED_ARCHIVE:-false}
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '${PORT:-8080}:${PORT:-8080}'
    depends_on:
      - mariadb
      - redis

  mariadb:
    image: mariadb:11.3
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:?DB_NAME is required in .env}
      MARIADB_USER: ${DB_USER:?DB_USER is required in .env}
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required in .env}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required in .env}
    volumes:
      - mariadb_data:/var/lib/mysql

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--requirepass', '${REDIS_PASSWORD:?REDIS_PASSWORD is required in .env}']
    volumes:
      - redis_data:/data

volumes:
  mariadb_data:
  redis_data:
