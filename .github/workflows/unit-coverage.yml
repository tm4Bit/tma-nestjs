name: Unit and Coverage

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  unit-and-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test -- --runInBand

      - name: Coverage gate
        run: npm run test:cov -- --runInBand
