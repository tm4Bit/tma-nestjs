name: Test Suite

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  unit-and-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test -- --runInBand

      - name: Coverage gate
        run: npm run test:cov -- --runInBand

  e2e:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.3
        env:
          MARIADB_DATABASE: app
          MARIADB_USER: app
          MARIADB_PASSWORD: app
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: app
      DB_USER: app
      DB_PASSWORD: app
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      RUN_DB_INTEGRATION_TESTS: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run e2e tests
        run: npm run test:e2e -- --runInBand
