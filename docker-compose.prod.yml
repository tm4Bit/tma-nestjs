services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    user: 'node'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      NODE_ENV: production
      PORT: ${PORT:-8080}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      LOG_DIR: ${LOG_DIR:-/app/.logs}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_MAX_FILES: ${LOG_MAX_FILES:-14d}
      LOG_MAX_SIZE: ${LOG_MAX_SIZE:-20m}
      LOG_DATE_PATTERN: ${LOG_DATE_PATTERN:-YYYY-MM-DD}
      LOG_ZIPPED_ARCHIVE: ${LOG_ZIPPED_ARCHIVE:-true}
    ports:
      - '${PORT:-8080}:${PORT:-8080}'
