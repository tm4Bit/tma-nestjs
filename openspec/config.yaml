schema: spec-driven

context: |
  Projeto: Kickstart NestJS para desenvolver para a Ovlk.

  Banco de dados:
  - MariaDB para dados de negócio.
  - Usar Knex.js como query builder (sem ORM, sem models/entities). Apenas SQL via Knex.

  Redis (obrigatório):
  - Redis é obrigatório para BullMQ (filas).
  - Redis também será o store padrão de cache (não usar MariaDB para cache/filas).

  Filas:
  - BullMQ configurado usando Redis (connection via env).
  - Workers e queues organizados por módulo/domínio.

  Cache:
  - Cache habilitado por padrão, armazenado em Redis.

  Sessão/Cookies (preferência: JWT):
  - Preferência: JWT transportado por cookies HttpOnly.
  - Como frontend e API estão em domínios diferentes:
    - Cookies devem ser compatíveis com cross-site: SameSite=None e Secure=true (em HTTPS).
    - CORS deve permitir credentials e origem explícita do frontend.
  - A implementação deve permitir trocar a estratégia no futuro (ex.: session server-side) com impacto mínimo.

  Funcionalidades obrigatórias no kickstart:
  - Logs: arquivo com rotação/expiração + logs no terminal.
  - Task scheduling: cron jobs.
  - Validation: Zod validando body/params/query.
  - Serialização: respostas sempre serializadas.
  - Tratamento de erros: formato único de erro com handler global.
  - Cookies: suporte a cookies para autenticação/sessão no frontend.

  Infra/DevEx:
  - Docker para dev e prod (incluindo MariaDB e Redis).
  - Makefile com comandos comuns.
  - Lint + formatter opinativos e consistentes.

  Segurança:
  - CORS configurado (origem do frontend via env) + credentials.
  - Helmet habilitado.
  - Rate limit habilitado (store preferencial Redis).

  Padrões de arquitetura:
  - Cada recurso tem Controller: index, create, show, update, destroy.
  - Se a action fizer mais do que algo trivial, mover lógica para Service.
  - Sempre existir camada de Repository (Knex aqui).
  - TDD por padrão: unit + e2e para controllers/services/repositories e cross-cutting concerns.

  Variáveis de ambiente (mínimo):
  - NODE_ENV, PORT
  - DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
  - REDIS_HOST, REDIS_PORT, REDIS_PASSWORD (opcional)
  - JWT_SECRET, JWT_EXPIRES_IN
  - FRONTEND_ORIGIN
  - COOKIE_DOMAIN, COOKIE_SECURE, COOKIE_SAMESITE

rules:
  specs:
    - Autenticação JWT via cookies deve ser definida com contrato configurável por env (nomes, flags, domínio).
    - Por ser cross-domain: especificar CORS com credentials e origem explícita.
    - Definir formato padrão de resposta (sucesso e erro) e exemplos.

  design:
    - Isolar autenticação (guards/strategies/interceptors) para permitir troca futura.
    - Incluir onde entram cache (Redis), filas (BullMQ/Redis), logs, cron, error handling e serialização.

  tasks:
    - Todas as tasks devem incluir testes (TDD).
    - Incluir docker-compose dev com MariaDB + Redis, e Dockerfile/compose prod.
